services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vfstest
      POSTGRES_PASSWORD: vfstestpass
      POSTGRES_DB: vfstestdb
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vfstest -d vfstestdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis-test:
    image: redis:7-alpine
    command: redis-server --requirepass testpass
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "testpass", "ping"]
      interval: 5s
      retries: 10

volumes: {}
